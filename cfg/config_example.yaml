# `import torch` so vLLM and transformers find the cached weights.
huggingface:
  hf_home: /path/to/huggingface_cache
  hf_hub_cache: /path/to/huggingface_cache/hub

optimal_mask_generation:
  output_path: /path/to/CXReasoning/src/00_source_data_curation/

mask_deformation:
  zone_mask_source: chex_vertical_thirds
  save_visualization: false

eval_vlm_on_chexpercept:
  output_path: /path/to/CXReasoning/src/03_eval_vlm_on_chexpercept/outputs/
